## ═══════════════════════════════════════════════════
##  VPS Control App - Docker Compose
##  Joins external Traefik network for HTTPS ingress.
##  DB is isolated on a private bridge network.
## ═══════════════════════════════════════════════════

services:
  # ─── Next.js Application ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vps-control-app
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    labels:
      # --- Enable Traefik discovery ---
      - "traefik.enable=true"

      # --- HTTPS Router ---
      - "traefik.http.routers.vps-control.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.vps-control.entrypoints=websecure"
      - "traefik.http.routers.vps-control.tls=true"
      - "traefik.http.routers.vps-control.tls.certresolver=${CERT_RESOLVER}"

      # --- Service (tell Traefik which port to forward to) ---
      - "traefik.http.services.vps-control.loadbalancer.server.port=3000"

      # --- HTTP-to-HTTPS redirect router ---
      - "traefik.http.routers.vps-control-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.vps-control-http.entrypoints=web"
      - "traefik.http.routers.vps-control-http.middlewares=vps-https-redirect"
      - "traefik.http.middlewares.vps-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.vps-https-redirect.redirectscheme.permanent=true"
    networks:
      - traefik_network
      - internal

  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    container_name: vps-control-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vpscontrol}
      POSTGRES_USER: ${DB_USER:-vpscontrol}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vpscontrol} -d ${DB_NAME:-vpscontrol}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal
    # No Traefik labels — DB must NEVER be exposed to the internet

volumes:
  pgdata:
    driver: local

networks:
  traefik_network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
  internal:
    driver: bridge
